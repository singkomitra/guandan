name: Acquire Unity Activation File

on:
  workflow_dispatch: {}

jobs:
  activation:
    runs-on: ubuntu-latest
    steps:
      - uses: game-ci/unity-request-activation-file@v2
        id: activation
        with:
          unityVersion: 6000.3.11f1

      - uses: actions/upload-artifact@v4
        with:
          name: unity.alf
          path: ${{ steps.activation.outputs.filePath }}
